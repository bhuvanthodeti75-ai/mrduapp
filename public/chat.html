<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Hub — MRDU Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    .chat-container {
      display: flex; flex-direction: column; height: calc(100vh - 120px);
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
    }
    .chat-tabs {
      display: flex; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 8px; gap: 8px;
    }
    .tab-btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; font-weight: 600; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab-btn.active { background: var(--accent); color: white; }
    
    .messages-area {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
      background: rgba(0,0,0,0.1);
    }
    .message-bubble {
      max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; position: relative;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .msg-received { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
    .msg-sent { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
    
    .msg-info { font-size: 10px; margin-bottom: 4px; color: var(--text-muted); }
    .msg-sent .msg-info { color: rgba(255,255,255,0.7); text-align: right; }
    
    .input-area {
      padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px;
      background: rgba(255,255,10,0.02);
    }
    .chat-input {
      flex: 1; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03); color: var(--text); outline: none; transition: all 0.2s;
    }
    .chat-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }
    
    .private-search {
      padding: 20px; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; height: 100%;
      text-align: center;
    }
    .search-row { display: flex; gap: 10px; width: 100%; max-width: 400px; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div style="max-width: 1000px; width: 95%; margin: 0 auto;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <a href="/dashboard.html" class="btn-ghost" style="width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
            <i class="fas fa-home"></i>
          </a>
          <h1 style="font-size: 24px; margin: 0;">💬 Chat Hub</h1>
        </div>
        <a href="/chat-requests.html" class="btn-ghost" style="width: auto; padding: 10px 18px; position: relative;">
          <i class="fas fa-user-friends"></i> Requests
        </a>
      </div>

      <div class="chat-container">
        <div class="chat-tabs">
          <button class="tab-btn active" id="tab-global" onclick="switchTab('global')">
            <i class="fas fa-globe"></i> Global Chat
          </button>
          <button class="tab-btn" id="tab-private" onclick="switchTab('private')">
            <i class="fas fa-lock"></i> Private Messaging
          </button>
        </div>

        <div id="global-section" style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
          <div id="global-messages" class="messages-area">
            <!-- Global messages -->
          </div>
          <form id="global-form" class="input-area">
            <input type="text" id="global-input" class="chat-input" placeholder="Say something to everyone..." required />
            <button type="submit" class="btn-primary" style="width: 44px; padding: 0;"><i class="fas fa-paper-plane"></i></button>
          </form>
        </div>


        <div id="private-section" style="display: none; height: 100%; padding: 20px; overflow-y: auto;">
          <h2 style="font-size: 18px; margin-bottom: 16px;">Private Conversations</h2>
          <div id="accepted-chat-list" style="display: flex; flex-direction: column; gap: 12px;">
            <div style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'global';
    let myRoll = '';
    let pollingInterval;

    async function init() {
      const res = await fetch('/api/auth/me');
      const data = await res.json();
      myRoll = data.user.rollNumber;
      
      loadGlobalChat();
      pollingInterval = setInterval(loadGlobalChat, 3000);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      
      document.getElementById('global-section').style.display = 'none';
      document.getElementById('private-section').style.display = 'none';
      
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }

      if (tab === 'global') {
        document.getElementById('global-section').style.display = 'flex';
        loadGlobalChat();
        pollingInterval = setInterval(loadGlobalChat, 3000);
      } else {
        document.getElementById('private-section').style.display = 'block';
        loadPrivateChats();
      }
    }

    let lastGlobalMsgId = null;

    function renderBubble(m) {
      const isMe = m.senderRollNumber === myRoll;
      return `
        <div class="message-bubble ${isMe ? 'msg-sent' : 'msg-received'}">
          <div class="msg-info">${isMe ? 'You' : m.senderRollNumber} • ${new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
          <div>${m.message}</div>
        </div>
      `;
    }

    async function loadGlobalChat() {
      if (currentTab !== 'global') return;
      try {
        const res = await fetch('/api/chat/global');
        const messages = await res.json();
        const area = document.getElementById('global-messages');
        const isAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 100;

        if (messages.length === 0) {
          area.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">No messages yet. Start the conversation!</div>`;
          lastGlobalMsgId = null;
          return;
        }

        const latestId = messages[messages.length - 1]._id;
        if (lastGlobalMsgId === latestId) return; // No new messages

        const lastMsgIndex = messages.findIndex(m => m._id === lastGlobalMsgId);
        
        if (lastGlobalMsgId === null || lastMsgIndex === -1) {
          // Full render (first load, or previous messages fell off limit)
          const oldScroll = area.scrollTop;
          area.innerHTML = messages.map(m => renderBubble(m)).join('');
          if (lastGlobalMsgId !== null && !isAtBottom) {
            area.scrollTop = oldScroll;
          }
        } else {
          // Append new messages safely to avoid animation blinking and scroll resetting
          const newMessages = messages.slice(lastMsgIndex + 1);
          const temp = document.createElement('div');
          temp.innerHTML = newMessages.map(m => renderBubble(m)).join('');
          while(temp.firstChild) {
            area.appendChild(temp.firstChild);
          }
        }

        lastGlobalMsgId = latestId;

        if (isAtBottom || lastGlobalMsgId === null) {
          area.scrollTop = area.scrollHeight;
        }
      } catch (err) { console.error('Load global error:', err); }
    }

    document.getElementById('global-form').onsubmit = async (e) => {
      e.preventDefault();
      const input = document.getElementById('global-input');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      try {
        await fetch('/api/chat/global', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        loadGlobalChat();
      } catch (err) { console.error('Send error:', err); }
    };

    async function loadPrivateChats() {
      try {
        const res = await fetch('/api/chat-request/all-accepted');
        const accepted = await res.json();
        const container = document.getElementById('accepted-chat-list');
        
        if (accepted.length === 0) {
          container.innerHTML = `
            <div style="text-align:center; padding: 40px; color: var(--text-muted); background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border);">
              <i class="fas fa-user-friends" style="font-size: 32px; opacity: 0.3; margin-bottom: 16px;"></i>
              <p>No active conversations.</p>
              <a href="/chat-requests.html" class="btn-primary" style="display: inline-block; padding: 8px 16px; margin-top: 16px; text-decoration: none;">Find Students</a>
            </div>
          `;
          return;
        }

        container.innerHTML = accepted.map(req => {
          const otherUser = req.senderRollNumber === myRoll ? req.receiverRollNumber : req.senderRollNumber;
          return `
            <div onclick="location.href='/private-chat.html?roll=${otherUser}'" style="padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='rgba(255,255,255,0.03)'">
              <div style="display: flex; align-items: center; gap: 16px;">
                <div style="width: 48px; height: 48px; border-radius: 12px; background: var(--success); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: white;">
                  ${otherUser.slice(0, 2)}
                </div>
                <div>
                  <div style="font-weight: 700; font-size: 16px;">${otherUser}</div>
                  <div style="font-size: 13px; color: var(--success);">Connected ${new Date(req.createdAt).toLocaleDateString()}</div>
                </div>
              </div>
              <i class="fas fa-chevron-right" style="color: var(--text-muted); opacity: 0.5;"></i>
            </div>
          `;
        }).join('');
      } catch (err) {
        console.error('Load private chats error:', err);
      }
    }

    init();
  </script>
</body>
</html>
