<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Course — MRDU Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .form-input, .form-textarea { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.03); color: var(--text); outline: none; transition: all 0.2s; }
    .form-input:focus, .form-textarea:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }
    .form-textarea { height: 100px; resize: vertical; }
    .content-links-container { display: flex; flex-direction: column; gap: 10px; }
    .link-row { display: flex; gap: 10px; }
    .remove-link { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; width: 44px; height: 44px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .remove-link:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="auth-card" style="max-width: 600px;">
      <div style="margin-bottom: 32px;">
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
          <button onclick="history.back()" class="btn-ghost" style="width: auto; margin: 0; padding: 6px 12px; font-size: 12px;">
            <i class="fas fa-arrow-left"></i> Back
          </button>
        </div>
        <h1 style="font-size: 24px; margin: 0;">🛠 Edit Course</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Update your course details and content.</p>
      </div>

      <div id="loadingForm" style="text-align: center; padding: 40px;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 32px; color: var(--accent);"></i>
        <p style="margin-top: 10px;">Fetching course details...</p>
      </div>

      <form id="edit-course-form" style="display: none;">
        <div class="form-group">
          <label class="form-label">Course Title <span style="color: var(--error);">*</span></label>
          <input type="text" id="title" class="form-input" required />
        </div>

        <div class="form-group">
          <label class="form-label">Description <span style="color: var(--error);">*</span></label>
          <textarea id="description" class="form-textarea" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Contact/WhatsApp Number <span style="color: var(--error);">*</span></label>
          <input type="tel" id="contact" class="form-input" required />
        </div>

        <div class="form-group">
          <label class="form-label">Price (0 for Free) <span style="color: var(--error);">*</span></label>
          <div style="position: relative;">
            <span style="position: absolute; left: 16px; top: 12px; color: var(--text-muted);">₹</span>
            <input type="number" id="price" class="form-input" style="padding-left: 32px;" min="0" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Course Content (Links)</label>
          <div id="content-links" class="content-links-container">
            <!-- Existing links injected here -->
          </div>
          <button type="button" id="add-link-btn" class="btn-ghost" style="width: auto; margin: 12px 0 0 0; padding: 8px 16px; font-size: 13px;">
            <i class="fas fa-plus"></i> Add Another Link
          </button>
        </div>

        <div class="form-group">
          <label class="form-label">Upload New Files</label>
          <div id="drop-zone" style="border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer;">
            <i class="fas fa-cloud-upload-alt" style="font-size: 24px; color: var(--accent); margin-bottom: 8px;"></i>
            <p style="margin: 0; font-size: 13px; color: var(--text-muted);">Click to add files</p>
            <input type="file" id="file-input" style="display: none;" multiple />
            <div id="file-list" style="margin-top: 12px; display: flex; flex-direction: column; gap: 8px; text-align: left;"></div>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary" style="margin-top: 12px;">Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    const contentLinks = document.getElementById('content-links');
    const addLinkBtn = document.getElementById('add-link-btn');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    let selectedFiles = [];

    async function loadCourse() {
      if (!courseId) { window.location.href = '/courses.html'; return; }
      try {
        const res = await fetch(`/api/courses/${courseId}`);
        if (!res.ok) throw new Error('Course not found');
        const course = await res.json();

        if (!course.isInstructor) { alert('Unauthorized'); window.location.href = '/courses.html'; return; }

        document.getElementById('title').value = course.title;
        document.getElementById('description').value = course.description;
        document.getElementById('contact').value = course.contact;
        document.getElementById('price').value = course.price;

        if (course.content && course.content.length > 0) {
          course.content.forEach(link => {
            addLinkRow(link);
          });
        } else {
          addLinkRow('');
        }

        document.getElementById('loadingForm').style.display = 'none';
        document.getElementById('edit-course-form').style.display = 'block';

      } catch (err) {
        alert(err.message);
        window.location.href = '/courses.html';
      }
    }

    function addLinkRow(value = '') {
      const div = document.createElement('div');
      div.className = 'link-row';
      div.innerHTML = `
        <input type="text" class="form-input content-link" placeholder="External link or uploaded path" value="${value}" />
        <button type="button" class="remove-link" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
      `;
      contentLinks.appendChild(div);
    }

    addLinkBtn.onclick = () => addLinkRow('');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = () => {
      for (let f of fileInput.files) selectedFiles.push(f);
      renderFiles();
    };

    function renderFiles() {
      fileList.innerHTML = '';
      selectedFiles.forEach((file, index) => {
        const div = document.createElement('div');
        div.style.cssText = 'display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; font-size: 13px;';
        div.innerHTML = `
          <span><i class="fas fa-file-alt" style="margin-right:8px; color:var(--accent);"></i> ${file.name}</span>
          <button type="button" style="background:none; border:none; color:#ef4444; cursor:pointer;" onclick="event.stopPropagation(); removeFile(${index})"><i class="fas fa-times"></i></button>
        `;
        fileList.appendChild(div);
      });
    }

    window.removeFile = (index) => {
      selectedFiles.splice(index, 1);
      renderFiles();
    };

    document.getElementById('edit-course-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      const formData = new FormData();
      formData.append('title', document.getElementById('title').value);
      formData.append('description', document.getElementById('description').value);
      formData.append('contact', document.getElementById('contact').value);
      formData.append('price', document.getElementById('price').value);

      const links = Array.from(document.querySelectorAll('.content-link')).map(input => input.value).filter(v => v.trim() !== '');
      links.forEach(l => formData.append('content', l));
      selectedFiles.forEach(f => formData.append('files', f));

      try {
        const res = await fetch(`/api/courses/${courseId}`, {
          method: 'PATCH',
          body: formData
        });

        if (res.ok) {
          window.location.href = `/course-details.html?id=${courseId}`;
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to update course');
          btn.disabled = false;
          btn.textContent = 'Save Changes';
        }
      } catch (err) {
        alert('Network error');
        btn.disabled = false;
        btn.textContent = 'Save Changes';
      }
    };

    loadCourse();
  </script>
</body>
</html>
