<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses — MRDU Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    .search-container {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.05);
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .course-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .course-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.5);
    }

    .course-header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(242, 110, 81, 0.1), rgba(124, 58, 237, 0.05));
      border-bottom: 1px solid var(--border);
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .course-header i {
      font-size: 40px;
      color: var(--accent);
      opacity: 0.8;
    }

    .course-body {
      padding: 20px;
      flex: 1;
    }

    .course-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .course-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .course-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .course-price {
      font-weight: 700;
      color: var(--accent);
    }

    .course-price.free {
      color: var(--success);
    }

    .instructor-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
  </style>
</head>

<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="auth-card" style="max-width: 1000px; width: 95%;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <div style="display: flex; align-items: flex-start; gap: 16px;">
          <a href="/dashboard.html" class="btn-ghost"
            style="width: auto; margin: 0; padding: 10px; height: 44px; width: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px;"
            title="Back to Dashboard">
            <i class="fas fa-home" style="margin: 0; font-size: 18px;"></i>
          </a>
          <div>
            <h1 style="font-size: 24px; margin: 0;">🎓 Learning Hub(MRDU)</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Explor e and enroll in student-led
              courses.</p>
          </div>
        </div>
        <div style="display: flex; gap: 12px;">
          <a href="/notifications.html" id="nav-bell" style="text-decoration:none; position:relative; background: rgba(242, 110, 81, 0.08); border: 1px solid rgba(242, 110, 81, 0.25); color: #F26E51; padding: 10px 14px; border-radius: 8px; display:inline-flex; align-items:center; justify-content:center; transition:0.2s;">
            <i class="fas fa-bell"></i>
            <span id="unread-badge" style="position:absolute; top:-5px; right:-5px; background:var(--error); color:white; font-size:10px; font-weight:bold; padding:2px 5px; border-radius:10px; display:none;">0</span>
          </a>
          <a href="/my-courses.html" class="btn-ghost" style="width: auto; margin: 0; padding: 10px 18px;"><i
              class="fas fa-book"></i> My Courses</a>
          <a href="/add-course.html" class="btn-primary" style="width: auto; margin: 0; padding: 10px 18px;"><i
              class="fas fa-plus"></i> Create Course</a>
        </div>
      </div>

      <div class="search-container">
        <input type="text" id="search-input" class="search-input"
          placeholder="Search for courses, topics, or instructors..." />
        <button id="search-btn" class="btn-primary" style="width: auto; margin: 0; padding: 0 24px;"><i
            class="fas fa-search"></i></button>
      </div>

      <div id="course-list" class="course-grid">
        <!-- Courses injected here -->
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <i class="fas fa-graduation-cap"></i>
        <h3>No courses available yet</h3>
        <p>Be the first to share your knowledge with other students!</p>
        <a href="/add-course.html" class="btn-primary"
          style="display: inline-block; width: auto; margin-top: 20px;">Create a Course</a>
      </div>
    </div>
  </div>

  <script>
    async function fetchCourses(search = '') {
      try {
        const url = search ? `/api/courses?search=${encodeURIComponent(search)}` : '/api/courses';
        const res = await fetch(url);
        if (!res.ok) throw new Error('Failed to fetch');
        const courses = await res.json();

        const list = document.getElementById('course-list');
        const empty = document.getElementById('empty-state');

        if (courses.length === 0) {
          list.innerHTML = '';
          empty.style.display = 'block';
          return;
        }

        empty.style.display = 'none';
        list.innerHTML = courses.map(c => `
          <div class="course-card" onclick="location.href='/course-details.html?id=${c.id}'">
            <div class="course-header">
              <i class="fas fa-book-open"></i>
            </div>
            <div class="course-body">
              <div class="course-title">${c.title}</div>
              <div class="course-desc">${c.description}</div>
            </div>
            <div class="course-footer">
              <div class="course-price ${c.price === 0 ? 'free' : ''}">
                ${c.price === 0 ? 'FREE' : '₹' + c.price}
              </div>
              <div class="instructor-tag">
                <i class="fas fa-user-graduate"></i> ${c.instructorRollNumber}
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('search-btn').onclick = () => {
      fetchCourses(document.getElementById('search-input').value);
    };

    document.getElementById('search-input').onkeyup = (e) => {
      if (e.key === 'Enter') fetchCourses(e.target.value);
    };

    fetchCourses();

    async function pollNotifications() {
      try {
        const res = await fetch('/api/notifications/unread-count');
        if (!res.ok) return;
        const { count } = await res.json();
        const badge = document.getElementById('unread-badge');
        if (badge) {
          if (count > 0) {
            badge.style.display = 'block';
            badge.textContent = count > 99 ? '99+' : count;
          } else {
            badge.style.display = 'none';
          }
        }
      } catch (err) {}
    }
    setInterval(pollNotifications, 10000);
    setTimeout(pollNotifications, 500);
  </script>
</body>

</html>
