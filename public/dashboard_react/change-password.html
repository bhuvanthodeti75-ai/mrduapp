<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRDU Student Portal — Set New Password</title>
  <meta name="description" content="Set your new secure password for the MRDU Student Portal." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════════
       MRDU Change Password — Clean Light Theme with Forest Green Accents
       ═══════════════════════════════════════════════════════════════ */

    :root {
      --bg-page: radial-gradient(circle, #fcfbfa 0%, #f4f2ec 100%);
      --bg-card: #ffffff;
      --bg-input: #f7f7f5;
      --bg-input-focus: #ffffff;

      --green-dark: #1a3c34;
      --green-deep: #0f2b24;
      --green-accent: #2d6a4f;
      --green-muted: #3a7d5e;
      --gold-accent: #c9a84c;

      --text-primary: #1a1a1a;
      --text-secondary: #555555;
      --text-muted: #999999;
      --text-on-dark: #f0efe8;

      --border-light: #e5e3dc;
      --border-input: #ddd9d0;

      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #b91c1c;

      --success: #2d6a4f;
      --warning: #c9a84c;

      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 24px;

      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.06);
      --shadow-input: 0 1px 3px rgba(0, 0, 0, 0.04);
      --shadow-btn: 0 4px 14px rgba(26, 60, 52, 0.3);
    }

    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--green-dark), var(--green-accent), var(--gold-accent));
      z-index: 100;
    }

    /* ─── Auth Card ─────────────────────────────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      padding: 40px 36px;
      animation: cardIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      position: relative;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Logo / Brand ──────────────────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      background: var(--green-dark);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      position: relative;
      box-shadow: 0 6px 20px rgba(26, 60, 52, 0.25);
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
      color: var(--text-on-dark);
    }

    .brand-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 14px;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ─── Step Indicator ────────────────────────────────────────────── */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e5e3dc;
      transition: all 0.3s;
    }

    .step-dot.active {
      background: var(--green-dark);
      width: 24px;
      border-radius: 4px;
    }

    .step-dot.done {
      background: var(--success);
    }

    .step-line {
      width: 24px;
      height: 2px;
      background: #e5e3dc;
    }

    .step-line.done {
      background: var(--success);
    }

    /* ─── Screen Titles ─────────────────────────────────────────────── */
    .screen-title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .screen-subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ─── Alerts ────────────────────────────────────────────────────── */
    .alert {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      animation: alertIn 0.3s ease;
    }

    .alert.show { display: flex; }

    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .alert-error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ─── Form Elements ─────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .form-input {
      width: 100%;
      background: var(--bg-input);
      border: 1.5px solid var(--border-input);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 14px 44px 14px 44px;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input:focus {
      background: var(--bg-input-focus);
      border-color: var(--green-accent);
      box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
    }

    .form-input:focus ~ .input-icon {
      color: var(--green-accent);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    .pw-toggle:hover {
      color: var(--green-accent);
    }

    /* Rules list */
    .rules-list {
      list-style: none;
      font-size: 12.5px;
      color: var(--text-secondary);
      margin: 16px 0;
      padding-left: 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .rules-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    /* ─── Password Strength ─────────────────────────────────────────── */
    .strength-bar {
      height: 3px;
      background: #e5e3dc;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 3px;
      transition: all 0.4s ease;
      width: 0%;
    }

    .strength-fill.weak   { background: var(--error-text); width: 33%; }
    .strength-fill.medium { background: var(--warning); width: 66%; }
    .strength-fill.strong { background: var(--success); width: 100%; }

    .strength-text {
      font-size: 11px;
      margin-top: 5px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .strength-text.weak   { color: var(--error-text); }
    .strength-text.medium { color: var(--warning); }
    .strength-text.strong { color: var(--success); }

    /* ─── Buttons ───────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 15px 20px;
      background: var(--green-dark);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s ease;
      text-transform: uppercase;
      box-shadow: var(--shadow-btn);
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: var(--green-deep);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ────────────────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--green-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; border-radius: var(--radius-lg); }
    }
  </style>
</head>
<body>
  <div class="auth-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand-title">Malla Reddy Deemed to be University</div>
      <div class="brand-sub">SET YOUR PASSWORD</div>
    </div>

    <!-- Step indicator -->
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-line done"></div>
      <div class="step-dot done"></div>
      <div class="step-line done"></div>
      <div class="step-dot active"></div>
    </div>

    <h1 class="screen-title">Create Password</h1>
    <p class="screen-subtitle">Your identity is verified. Set a strong password to complete your account setup.</p>

    <!-- Alert -->
    <div id="alert" class="alert">
      <span class="alert-icon" id="alert-icon">⚠️</span>
      <span id="alert-msg">Error</span>
    </div>

    <!-- Form -->
    <form id="pw-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="new-password">New Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="new-password"
            class="form-input"
            placeholder="Minimum 6 characters"
            autocomplete="new-password"
          />
          <span class="input-icon">🔐</span>
          <button type="button" class="pw-toggle" id="toggle1" aria-label="Toggle password visibility">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-text" id="strength-text"></div>
      </div>

      <div class="form-group" style="margin-top: 18px;">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="confirm-password"
            class="form-input"
            placeholder="Re-enter your password"
            autocomplete="new-password"
          />
          <span class="input-icon">✅</span>
          <button type="button" class="pw-toggle" id="toggle2" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <ul class="rules-list">
        <li id="rule-len">✗ At least 6 characters</li>
        <li id="rule-match">✗ Passwords must match</li>
      </ul>

      <button type="submit" class="btn-primary" id="set-btn">Set Password & Continue</button>
    </form>

    <!-- Footer -->
    <div class="footer">
      <span>Need help? <a href="#">Contact Support</a></span>
    </div>

  </div>

  <script>
    const newPw = document.getElementById('new-password');
    const confPw = document.getElementById('confirm-password');
    const setBtn = document.getElementById('set-btn');
    const alertEl = document.getElementById('alert');
    const alertMsg = document.getElementById('alert-msg');
    const alertIcon = document.getElementById('alert-icon');
    const strengthFill = document.getElementById('strength-fill');
    const strengthText = document.getElementById('strength-text');
    const ruleLen = document.getElementById('rule-len');
    const ruleMatch = document.getElementById('rule-match');

    // Password toggles
    document.getElementById('toggle1').addEventListener('click', () => {
      const t = newPw.type === 'password' ? 'text' : 'password';
      newPw.type = t;
      document.getElementById('toggle1').textContent = t === 'text' ? '🙈' : '👁';
    });
    document.getElementById('toggle2').addEventListener('click', () => {
      const t = confPw.type === 'password' ? 'text' : 'password';
      confPw.type = t;
      document.getElementById('toggle2').textContent = t === 'text' ? '🙈' : '👁';
    });

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert alert-${type} show`;
      alertMsg.textContent = msg;
      alertIcon.textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
    }
    function hideAlert() { alertEl.className = 'alert'; }

    function getStrength(pw) {
      if (!pw || pw.length < 6) return 'weak';
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      if (score <= 1) return 'weak';
      if (score <= 3) return 'medium';
      return 'strong';
    }

    function updateRules() {
      const pw = newPw.value;
      const conf = confPw.value;
      const lenOk = pw.length >= 6;
      const matchOk = pw && conf && pw === conf;

      ruleLen.textContent = lenOk ? '✓ At least 6 characters' : '✗ At least 6 characters';
      ruleLen.style.color = lenOk ? 'var(--success)' : 'var(--text-secondary)';

      ruleMatch.textContent = matchOk ? '✓ Passwords match' : '✗ Passwords must match';
      ruleMatch.style.color = matchOk ? 'var(--success)' : 'var(--text-secondary)';

      const s = getStrength(pw);
      strengthFill.className = `strength-fill${pw.length ? ' ' + s : ''}`;
      strengthText.className = `strength-text${pw.length ? ' ' + s : ''}`;
      strengthText.textContent = pw.length ? ({ weak: 'Weak', medium: 'Medium', strong: 'Strong' }[s]) : '';
    }

    newPw.addEventListener('input', updateRules);
    confPw.addEventListener('input', updateRules);

    document.getElementById('pw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      const newPassword = newPw.value;
      const confirmPassword = confPw.value;

      if (newPassword.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
      if (newPassword !== confirmPassword) { showAlert('Passwords do not match.'); return; }

      setBtn.disabled = true;
      setBtn.innerHTML = '<span class="spinner"></span> Setting Password...';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword, confirmPassword }),
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            showAlert('Session expired. Please login again.');
            setTimeout(() => window.location.replace('/'), 2000);
            return;
          }
          showAlert(data.error || 'Failed to set password.');
          return;
        }

        // Store user info for dashboard
        if (data.user) sessionStorage.setItem('userData', JSON.stringify(data.user));
        showAlert('Password set! Redirecting to your dashboard...', 'success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
      } catch {
        showAlert('Network error. Please try again.');
      } finally {
        setBtn.disabled = false;
        setBtn.textContent = 'Set Password & Continue';
      }
    });
  </script>
</body>
</html>
