<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Details — Student Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-animate">
    <div class="glass-container auth-card" style="max-width: 600px;">
        <div id="loadingDetail" class="loading-text">
            <i class="fas fa-circle-notch fa-spin"></i> Loading service details...
        </div>

        <div id="detailContent" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
                <a href="/services.html" class="btn-ghost" style="width: auto; margin: 0; padding: 8px 15px;"><i class="fas fa-arrow-left"></i> Back</a>
                <div id="ownerControls" style="display: none; gap: 10px;">
                    <button id="toggleAvailableBtn" class="btn-ghost" style="margin: 0; width: auto; color: var(--warning); border-color: rgba(245, 158, 11, 0.3);">
                        <i class="fas fa-toggle-on"></i> Available
                    </button>
                    <a id="editBtn" class="btn-ghost" style="margin: 0; width: auto; color: var(--accent); border-color: rgba(242, 110, 81, 0.3); text-decoration: none; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <button id="deleteBtn" class="btn-ghost" style="margin: 0; width: auto; color: var(--error); border-color: rgba(239, 68, 68, 0.3);">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>

            <div class="service-display-header" style="text-align: center; margin-bottom: 30px; padding: 40px 20px; background: rgba(242, 110, 81,0.05); border-radius: 12px; border: 1px dashed rgba(242, 110, 81,0.2);">
                <i id="serviceIcon" class="fas fa-file-alt" style="font-size: 4rem; color: var(--accent); margin-bottom: 15px;"></i>
                <div id="serviceCat" class="item-cat" style="justify-content: center;">CATEGORY</div>
                <h1 id="serviceTitle" class="welcome-name" style="margin: 10px 0;">Service Title</h1>
                <div id="servicePrice" class="item-price" style="font-size: 28px;">₹0</div>
            </div>

            <div class="info-tile" style="margin: 20px 0;">
                <div class="info-tile-label">What am I offering?</div>
                <div id="serviceDesc" class="info-tile-value" style="font-weight: 400; line-height: 1.6;">No description provided.</div>
            </div>

            <div class="info-grid">
                <div class="info-tile">
                    <div class="info-tile-label">Offered By</div>
                    <div id="providerRoll" class="info-tile-value">Roll Number</div>
                </div>
                <div class="info-tile">
                    <div class="info-tile-label">Posted On</div>
                    <div id="createdAt" class="info-tile-value">Date</div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <div id="contactSection">
                    <button id="requestContactBtn" class="btn-primary" style="width: 100%; justify-content: center; font-size: 16px; display: none;">
                        <i class="fas fa-paper-plane"></i> Request Contact Details
                    </button>
                    <div id="requestPending" class="alert alert-info" style="display: none; width: 100%; margin: 0; justify-content: center;">
                        <i class="fas fa-clock"></i> Contact Request Pending Approval
                    </div>
                    <div id="requestRejected" class="alert alert-error" style="display: none; width: 100%; margin: 0; justify-content: center;">
                        <i class="fas fa-times-circle"></i> Contact Request Rejected
                    </div>
                    <a id="whatsappBtn" href="#" target="_blank" class="btn-wa" style="width: 100%; justify-content: center; font-size: 16px; display: none;">
                        <i class="fab fa-whatsapp"></i> Contact via WhatsApp
                    </a>
                </div>
                <p style="text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 15px;">
                    Exchange academic help responsibly. Always communicate professionally.
                </p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const serviceId = urlParams.get('id');
        let currentUser = null;

        async function fetchDetails() {
            if (!serviceId) {
                window.location.href = '/services.html';
                return;
            }

            try {
                // Get current user
                const meRes = await fetch('/api/auth/me');
                if (!meRes.ok) throw new Error('Auth failed');
                const meData = await meRes.json();
                currentUser = meData.user;

                // Get service details
                const res = await fetch(`/api/services/${serviceId}`);
                if (!res.ok) {
                    throw new Error('Service not found');
                }
                const service = await res.json();

                if (!service) {
                    alert('Service not found');
                    window.location.href = '/services.html';
                    return;
                }

                document.getElementById('loadingDetail').style.display = 'none';
                document.getElementById('detailContent').style.display = 'block';

                document.getElementById('serviceTitle').textContent = service.title;
                document.getElementById('serviceCat').textContent = service.category;
                document.getElementById('servicePrice').textContent = `₹${service.price}`;
                document.getElementById('serviceDesc').textContent = service.description || 'No description provided.';
                document.getElementById('providerRoll').textContent = service.providerRollNumber;
                document.getElementById('createdAt').textContent = new Date(service.createdAt).toLocaleDateString();
                
                // Icon
                const iconMap = {
                    'Assignment': 'fa-file-alt',
                    'Lab Record': 'fa-flask',
                    'PPT': 'fa-file-powerpoint',
                    'Notes': 'fa-book-open',
                    'Project': 'fa-project-diagram'
                };
                document.getElementById('serviceIcon').className = `fas ${iconMap[service.category] || 'fa-hands-helping'}`;

                // Owner controls
                if (service.providerRollNumber === currentUser.rollNumber) {
                    document.getElementById('ownerControls').style.display = 'flex';
                    document.getElementById('editBtn').href = `/edit-service.html?id=${service.id}`;
                    const toggleBtn = document.getElementById('toggleAvailableBtn');
                    toggleBtn.innerHTML = service.isAvailable ? '<i class="fas fa-toggle-on"></i> Available' : '<i class="fas fa-toggle-off"></i> Out for now';
                    
                    document.getElementById('deleteBtn').onclick = () => deleteService(service.id);
                    toggleBtn.onclick = () => toggleService(service.id);

                    // Show self-label
                    const waBtn = document.getElementById('whatsappBtn');
                    waBtn.style.display = 'flex';
                    waBtn.innerHTML = '<i class="fas fa-user-shield"></i> This is your service';
                    waBtn.style.background = 'var(--accent)';
                    waBtn.href = '#';
                } else {
                    checkRequestStatus(service.id, service.title);
                }

            } catch (err) {
                console.error(err);
                window.location.href = '/';
            }
        }

        async function checkRequestStatus(targetId, title) {
            const res = await fetch(`/api/contact-request/status/${targetId}?targetType=service`);
            const data = await res.json();

            const requestBtn = document.getElementById('requestContactBtn');
            const pendingAlert = document.getElementById('requestPending');
            const rejectedAlert = document.getElementById('requestRejected');
            const whatsappBtn = document.getElementById('whatsappBtn');

            if (data.status === 'none') {
                requestBtn.style.display = 'flex';
                requestBtn.onclick = () => sendRequest(targetId);
            } else if (data.status === 'pending') {
                pendingAlert.style.display = 'flex';
            } else if (data.status === 'rejected') {
                rejectedAlert.style.display = 'flex';
            } else if (data.status === 'accepted') {
                whatsappBtn.style.display = 'flex';
                const waLink = `https://wa.me/91${data.contact.replace(/\D/g, '')}?text=Hi, I am interested in your service "${encodeURIComponent(title)}" on MRDU Student Portal.`;
                whatsappBtn.href = waLink;
            }
        }

        async function sendRequest(targetId) {
            const btn = document.getElementById('requestContactBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const res = await fetch('/api/contact-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetId, targetType: 'service' })
                });

                if (res.ok) {
                    location.reload();
                } else {
                    const data = await res.json();
                    alert(data.error || 'Failed to send request');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Request Contact Details';
                }
            } catch (err) {
                alert('Connection error');
                btn.disabled = false;
            }
        }

        async function toggleService(id) {
            const res = await fetch(`/api/services/${id}/toggle`, { method: 'PATCH' });
            if (res.ok) location.reload();
        }

        async function deleteService(id) {
            if (!confirm('Permanently remove this service?')) return;
            const res = await fetch(`/api/services/${id}`, { method: 'DELETE' });
            if (res.ok) window.location.href = '/services.html';
        }

        window.onload = fetchDetails;
    </script>
</body>
</html>
