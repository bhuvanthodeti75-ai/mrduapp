<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRDU Student Portal — Set New Password</title>
  <meta name="description" content="Set your new secure password for the MRDU Student Portal." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">🔒</div>
        <div class="brand-title">Malla Reddy Deemed to be University</div>
        <div class="brand-sub">SET YOUR PASSWORD</div>
      </div>

      <!-- Step indicator -->
      <div class="steps">
        <div class="step-dot done"></div>
        <div class="step-line"></div>
        <div class="step-dot done"></div>
        <div class="step-line"></div>
        <div class="step-dot active"></div>
      </div>

      <h1 class="screen-title">Create Password</h1>
      <p class="screen-subtitle">Your identity is verified. Set a strong password to complete your account setup.</p>

      <!-- Alert -->
      <div id="alert" class="alert">
        <span class="alert-icon" id="alert-icon">⚠️</span>
        <span id="alert-msg">Error</span>
      </div>

      <!-- Form -->
      <form id="pw-form" novalidate>

        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="new-password"
              class="form-input"
              placeholder="Minimum 6 characters"
              autocomplete="new-password"
            />
            <span class="input-icon">🔐</span>
            <button type="button" class="pw-toggle" id="toggle1" aria-label="Toggle">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-text" id="strength-text"></div>
        </div>

        <div class="form-group" style="margin-top: 18px;">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="confirm-password"
              class="form-input"
              placeholder="Re-enter your password"
              autocomplete="new-password"
            />
            <span class="input-icon">✅</span>
            <button type="button" class="pw-toggle" id="toggle2" aria-label="Toggle">👁</button>
          </div>
        </div>

        <ul style="font-size: 12px; color: var(--text-muted); margin: 14px 0 8px 16px; line-height: 2;">
          <li id="rule-len" style="transition: color 0.2s;">✗ At least 6 characters</li>
          <li id="rule-match" style="transition: color 0.2s;">✗ Passwords must match</li>
        </ul>

        <button type="submit" class="btn-primary" id="set-btn">Set Password & Continue</button>
      </form>

    </div>
  </div>

  <script>
    const newPw = document.getElementById('new-password');
    const confPw = document.getElementById('confirm-password');
    const setBtn = document.getElementById('set-btn');
    const alertEl = document.getElementById('alert');
    const alertMsg = document.getElementById('alert-msg');
    const alertIcon = document.getElementById('alert-icon');
    const strengthFill = document.getElementById('strength-fill');
    const strengthText = document.getElementById('strength-text');
    const ruleLen = document.getElementById('rule-len');
    const ruleMatch = document.getElementById('rule-match');

    // Password toggles
    document.getElementById('toggle1').addEventListener('click', () => {
      const t = newPw.type === 'password' ? 'text' : 'password';
      newPw.type = t;
      document.getElementById('toggle1').textContent = t === 'text' ? '🙈' : '👁';
    });
    document.getElementById('toggle2').addEventListener('click', () => {
      const t = confPw.type === 'password' ? 'text' : 'password';
      confPw.type = t;
      document.getElementById('toggle2').textContent = t === 'text' ? '🙈' : '👁';
    });

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert alert-${type} show`;
      alertMsg.textContent = msg;
      alertIcon.textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
    }
    function hideAlert() { alertEl.className = 'alert'; }

    function getStrength(pw) {
      if (!pw || pw.length < 6) return 'weak';
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      if (score <= 1) return 'weak';
      if (score <= 3) return 'medium';
      return 'strong';
    }

    function updateRules() {
      const pw = newPw.value;
      const conf = confPw.value;
      const lenOk = pw.length >= 6;
      const matchOk = pw && conf && pw === conf;

      ruleLen.textContent = lenOk ? '✓ At least 6 characters' : '✗ At least 6 characters';
      ruleLen.style.color = lenOk ? 'var(--success)' : 'var(--text-muted)';

      ruleMatch.textContent = matchOk ? '✓ Passwords match' : '✗ Passwords must match';
      ruleMatch.style.color = matchOk ? 'var(--success)' : 'var(--text-muted)';

      const s = getStrength(pw);
      strengthFill.className = `strength-fill${pw.length ? ' ' + s : ''}`;
      strengthText.className = `strength-text${pw.length ? ' ' + s : ''}`;
      strengthText.textContent = pw.length ? ({ weak: 'Weak', medium: 'Medium', strong: 'Strong' }[s]) : '';
    }

    newPw.addEventListener('input', updateRules);
    confPw.addEventListener('input', updateRules);

    document.getElementById('pw-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      const newPassword = newPw.value;
      const confirmPassword = confPw.value;

      if (newPassword.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
      if (newPassword !== confirmPassword) { showAlert('Passwords do not match.'); return; }

      setBtn.disabled = true;
      setBtn.innerHTML = '<span class="spinner"></span> Setting Password...';

      try {
        const res = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword, confirmPassword }),
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            showAlert('Session expired. Please login again.');
            setTimeout(() => window.location.replace('/'), 2000);
            return;
          }
          showAlert(data.error || 'Failed to set password.');
          return;
        }

        // Store user info for dashboard
        if (data.user) sessionStorage.setItem('userData', JSON.stringify(data.user));
        showAlert('Password set! Redirecting to your dashboard...', 'success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
      } catch {
        showAlert('Network error. Please try again.');
      } finally {
        setBtn.disabled = false;
        setBtn.textContent = 'Set Password & Continue';
      }
    });
  </script>
</body>
</html>
