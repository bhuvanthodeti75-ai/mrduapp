<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Feed — MRDU Student Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #f3f2eb !important;
      color: #0e291e !important;
      font-family: 'Inter', sans-serif !important;
      min-height: 100vh;
      display: block !important;
      padding: 0 !important;
      margin: 0 !important;
    }
    body::before, body::after, .grid-bg { display: none !important; }

    /* ── Navbar ── */
    .edu-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f3f2eb;
      border-bottom: 1px solid rgba(14,41,30,0.08);
      padding: 16px 8%;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand { font-size: 22px; font-weight: 800; color: #07442d; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-links { display: flex; gap: 32px; }
    .nav-links a { color: #4a5a51; text-decoration: none; font-weight: 500; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #07442d; }
    .nav-actions { display: flex; align-items: center; gap: 20px; }
    .bell-btn { position: relative; color: #0e291e; font-size: 18px; text-decoration: none; display: flex; align-items: center; }
    .badge-count { position: absolute; top: -5px; right: -5px; background: #b91c1c; color: white; font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 10px; }
    .nav-avatar-circle { width: 34px; height: 34px; border-radius: 50%; background: #07442d; color: #f3f2eb; font-weight: 700; font-size: 13px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid rgba(14,41,30,0.15); }

    /* ── Page wrapper ── */
    .page-wrapper { width: 100%; min-height: 100vh; margin: 0; padding: 20px 8%; box-sizing: border-box; }

    /* ── Page Header ── */
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
    .page-header-left h1 { font-size: 28px; font-weight: 850; color: #07442d; margin: 0 0 6px; letter-spacing: -0.5px; }
    .page-header-left p { font-size: 14px; color: #4a5a51; margin: 0; }

    /* ── Search bar ── */
    .search-row { display: flex; gap: 12px; margin-bottom: 28px; align-items: center; }
    .search-box { flex: 1; position: relative; }
    .search-box input {
      width: 100%; background: white; border: 1px solid rgba(14,41,30,0.15);
      color: #0e291e; border-radius: 10px; padding: 12px 16px 12px 42px;
      font-size: 14px; outline: none; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #07442d; }
    .search-box input::placeholder { color: #8b9a91; }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #4a5a51; font-size: 14px; }

    /* ── Buttons ── */
    .btn-create {
      display: inline-flex; align-items: center; gap: 8px;
      background: #07442d; color: #f3f2eb; border: none; border-radius: 10px;
      padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: background 0.2s; white-space: nowrap;
    }
    .btn-create:hover { background: #0a5538; }

    /* ── Post Card ── */
    .post-card {
      background: white; border: 1px solid rgba(14,41,30,0.1); border-radius: 16px;
      overflow: hidden; margin-bottom: 20px; transition: box-shadow 0.2s, transform 0.2s;
    }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(14,41,30,0.08); }

    .post-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(14,41,30,0.06);
    }
    .post-author { display: flex; align-items: center; gap: 12px; }
    .author-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #07442d, #0a5538);
      color: #f3f2eb; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .author-name { font-weight: 600; font-size: 14px; color: #0e291e; }
    .author-time { font-size: 12px; color: #8b9a91; margin-top: 2px; }
    .post-actions { display: flex; gap: 6px; }
    .action-btn {
      background: transparent; border: 1px solid rgba(14,41,30,0.12); color: #4a5a51;
      cursor: pointer; padding: 7px 10px; border-radius: 8px; transition: all 0.2s; font-size: 13px;
    }
    .action-btn:hover { background: rgba(14,41,30,0.06); color: #07442d; }
    .action-btn.delete:hover { background: rgba(185,28,28,0.08); color: #b91c1c; border-color: rgba(185,28,28,0.2); }

    .post-body { padding: 18px 20px; }
    .post-title { font-size: 17px; font-weight: 700; color: #07442d; margin: 0 0 10px; }
    .post-text { font-size: 14px; color: #4a5a51; line-height: 1.65; white-space: pre-wrap; margin: 0 0 14px; }

    .post-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
    }
    .meta-badge.date { background: rgba(7,68,45,0.08); color: #07442d; }
    .meta-badge.whatsapp { background: rgba(16,185,129,0.1); color: #059669; text-decoration: none; }
    .meta-badge.whatsapp:hover { background: rgba(16,185,129,0.18); }

    .post-image {
      width: 100%; max-height: 380px; object-fit: cover; display: block;
      border-top: 1px solid rgba(14,41,30,0.06); cursor: zoom-in; transition: opacity 0.2s;
    }
    .post-image:hover { opacity: 0.92; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 72px 32px;
      background: white; border: 1.5px dashed rgba(14,41,30,0.15); border-radius: 20px;
    }
    .empty-icon {
      width: 72px; height: 72px; background: rgba(7,68,45,0.07); border-radius: 16px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
      font-size: 28px; color: #07442d;
    }
    .empty-state h3 { font-size: 20px; font-weight: 700; color: #07442d; margin: 0 0 8px; }
    .empty-state p { font-size: 14px; color: #4a5a51; margin: 0 0 24px; max-width: 320px; margin-left: auto; margin-right: auto; }

    /* ── Image Modal ── */
    .img-modal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(14,41,30,0.85); backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      opacity: 0; transition: opacity 0.3s;
    }
    .img-modal.active { opacity: 1; }
    .img-modal img { max-width: 92%; max-height: 90vh; border-radius: 12px; object-fit: contain; transform: scale(0.95); transition: transform 0.3s; cursor: zoom-out; }
    .img-modal.active img { transform: scale(1); }
    .img-modal-close { position: absolute; top: 20px; right: 28px; color: white; font-size: 34px; cursor: pointer; opacity: 0.75; transition: opacity 0.2s; }
    .img-modal-close:hover { opacity: 1; }

    /* ── Loading ── */
    .loading-state { text-align: center; padding: 60px; color: #4a5a51; font-size: 15px; }
    .loading-state i { font-size: 24px; margin-bottom: 12px; display: block; color: #07442d; }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="edu-navbar">
    <a class="nav-brand" href="/dashboard.html">
      <i class="fas fa-graduation-cap" style="color:#07442d;"></i> EduMarket
    </a>
    <div class="nav-links">
      <a href="/marketplace.html">Marketplace</a>
      <a href="/services.html">Services</a>
      <a href="/requests.html">Requests</a>
      <a href="/promotions.html" class="active">Campus Feed</a>
    </div>
    <div class="nav-actions">
      <a class="bell-btn" href="/notifications.html" id="bell-btn">
        <i class="fas fa-bell"></i>
        <span class="badge-count" id="notif-count" style="display:none;"></span>
      </a>
      <div class="nav-avatar-circle" id="nav-initials" onclick="window.location='/profile.html'">M</div>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-wrapper">

    <!-- Header -->
    <div class="page-header">
      <div class="page-header-left">
        <h1>Campus Feed</h1>
        <p>Stay updated with university events, announcements &amp; promotions</p>
      </div>
      <a href="/add-promotion.html" class="btn-create">
        <i class="fas fa-plus"></i> Create Post
      </a>
    </div>

    <!-- Search -->
    <div class="search-row">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Search campus posts…" oninput="filterPosts()">
      </div>
    </div>

    <!-- Feed -->
    <div id="feed-root">
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i>
        Loading campus feed…
      </div>
    </div>

  </div>

  <!-- Image Modal -->
  <div id="imgModal" class="img-modal" onclick="closeImg()">
    <span class="img-modal-close" onclick="closeImg()">&times;</span>
    <img id="modalImg" src="" onclick="event.stopPropagation()">
  </div>

  <script>
    let myRoll = '';
    let allPosts = [];

    async function init() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/login.html'; return; }
        const data = await res.json();
        myRoll = data.user.rollNumber || '';
        const initials = myRoll.substring(0, 2).toUpperCase();
        document.getElementById('nav-initials').textContent = initials;
        loadFeed();
      } catch { window.location.href = '/login.html'; }
    }

    function timeAgo(d) {
      if (!d) return '';
      const date = typeof d === 'object' ? d : new Date(d);
      const secs = Math.round((Date.now() - date) / 1000);
      const mins = Math.round(secs / 60);
      if (secs < 5) return 'just now';
      if (secs < 60) return `${secs}s ago`;
      if (mins < 60) return `${mins}m ago`;
      if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
      return date.toLocaleDateString();
    }

    async function loadFeed() {
      try {
        const res = await fetch('/api/promotions', { credentials: 'include' });
        allPosts = await res.json();
        renderPosts(allPosts);
      } catch {
        document.getElementById('feed-root').innerHTML =
          `<div style="text-align:center;color:#b91c1c;padding:40px;font-size:14px;">Failed to load campus feed.</div>`;
      }
    }

    function filterPosts() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      if (!q) { renderPosts(allPosts); return; }
      const filtered = allPosts.filter(p =>
        (p.title || '').toLowerCase().includes(q) ||
        (p.description || '').toLowerCase().includes(q) ||
        (p.createdBy || '').toLowerCase().includes(q)
      );
      renderPosts(filtered);
    }

    function renderPosts(posts) {
      const root = document.getElementById('feed-root');
      if (posts.length === 0) {
        root.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fas fa-bullhorn"></i></div>
            <h3>No posts yet</h3>
            <p>Be the first to share an event or announcement with the campus community!</p>
            <a href="/add-promotion.html" class="btn-create" style="display:inline-flex;">
              <i class="fas fa-plus"></i> Create First Post
            </a>
          </div>`;
        return;
      }

      root.innerHTML = posts.map(post => {
        const isMine = post.createdBy === myRoll;
        const initials = (post.createdBy || 'U').substring(0, 2).toUpperCase();
        return `
          <div class="post-card">
            <div class="post-header">
              <div class="post-author">
                <div class="author-avatar">${initials}</div>
                <div>
                  <div class="author-name">${post.createdBy || 'Unknown'}</div>
                  <div class="author-time">${timeAgo(post.createdAt)}</div>
                </div>
              </div>
              <div class="post-actions">
                ${isMine ? `
                  <button class="action-btn" onclick="window.location='/edit-promotion.html?id=${post.id}'" title="Edit post">
                    <i class="fas fa-pen"></i>
                  </button>
                  <button class="action-btn delete" onclick="deletePost('${post.id}')" title="Delete post">
                    <i class="fas fa-trash"></i>
                  </button>` : ''}
              </div>
            </div>
            <div class="post-body">
              <div class="post-title">${post.title || ''}</div>
              <div class="post-meta">
                ${post.eventDate ? `<span class="meta-badge date"><i class="far fa-calendar-alt"></i> ${new Date(post.eventDate).toLocaleDateString()}</span>` : ''}
                ${post.contact ? `<a href="https://wa.me/91${post.contact.replace(/\D/g,'')}" target="_blank" class="meta-badge whatsapp"><i class="fab fa-whatsapp"></i> ${post.contact}</a>` : ''}
              </div>
              <div class="post-text">${post.description || ''}</div>
            </div>
            ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image" onclick="expandImg('${post.image}')">` : ''}
          </div>`;
      }).join('');
    }

    function expandImg(src) {
      document.getElementById('modalImg').src = src;
      const m = document.getElementById('imgModal');
      m.style.display = 'flex';
      setTimeout(() => m.classList.add('active'), 10);
    }

    function closeImg() {
      const m = document.getElementById('imgModal');
      m.classList.remove('active');
      setTimeout(() => m.style.display = 'none', 300);
    }

    async function deletePost(id) {
      if (!confirm('Delete this post permanently?')) return;
      try {
        await fetch(`/api/promotions/${id}`, { method: 'DELETE', credentials: 'include' });
        loadFeed();
      } catch { alert('Failed to delete post.'); }
    }

    init();
  </script>
</body>
</html>
