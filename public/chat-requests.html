<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Requests — MRDU Student Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <style>
    .request-list { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
    .request-card {
      background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 16px;
      display: flex; justify-content: space-between; align-items: center;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    
    .user-info { display: flex; align-items: center; gap: 16px; }
    .avatar {
      width: 48px; height: 48px; border-radius: 12px; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 18px; color: white;
      text-transform: uppercase;
    }
    .actions { display: flex; gap: 10px; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div style="max-width: 600px; width: 95%; margin: 0 auto;">
      <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 32px;">
        <a href="/chat.html" class="btn-ghost" style="width: 44px; height: 44px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px;">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h1 style="font-size: 24px; margin: 0;">📬 Chat Requests</h1>
      </div>

      <div class="private-search" style="margin-bottom: 32px; background: rgba(255,255,255,0.02); padding: 24px; border-radius: 16px; border: 1px solid var(--border);">
        <h2 style="font-size: 18px; margin-bottom: 8px;"><i class="fas fa-search" style="color: var(--accent);"></i> Find a Student</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 16px;">Enter a roll number to send a chat request.</p>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="search-roll" class="form-input" placeholder="e.g. 25EU08R0624" style="flex: 1; padding: 12px 16px;" />
          <button onclick="sendReq()" id="req-btn" class="btn-primary" style="width: auto; margin-top: 0; padding: 12px 24px;">Send Request</button>
        </div>
      </div>

      <div style="display: flex; gap: 24px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 250px;">
          <h2 style="font-size: 16px; margin-bottom: 16px; color: var(--text-primary);"><i class="fas fa-clock" style="color: var(--warning); margin-right: 6px;"></i> Pending Requests</h2>
          <div id="request-container" class="request-list" style="margin-top: 0;">
            <div style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
        <div style="flex: 1; min-width: 250px;">
          <h2 style="font-size: 16px; margin-bottom: 16px; color: var(--text-primary);"><i class="fas fa-check-circle" style="color: var(--success); margin-right: 6px;"></i> Accepted Connections</h2>
          <div id="accepted-container" class="request-list" style="margin-top: 0;">
            <div style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function loadRequests() {
      try {
        const [myRollRes, reqRes, accRes] = await Promise.all([
          fetch('/api/auth/me'),
          fetch('/api/chat-request/my'),
          fetch('/api/chat-request/all-accepted')
        ]);
        
        const myData = await myRollRes.json();
        const myRoll = myData.user.rollNumber;
        
        const requests = await reqRes.json();
        const accepted = await accRes.json();
        
        const reqContainer = document.getElementById('request-container');
        const accContainer = document.getElementById('accepted-container');

        // Pending Requests (Incoming)
        const pending = requests.filter(r => r.status === 'pending');
        if (pending.length === 0) {
          reqContainer.innerHTML = `
            <div style="text-align:center; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;">
              <i class="fas fa-envelope-open" style="font-size: 32px; opacity: 0.1; margin-bottom: 16px;"></i>
              <p style="color: var(--text-muted); font-size: 13px;">No pending requests.</p>
            </div>
          `;
        } else {
          reqContainer.innerHTML = pending.map(req => `
            <div class="request-card">
              <div class="user-info">
                <div class="avatar">${req.senderRollNumber.slice(0, 2)}</div>
                <div>
                  <div style="font-weight: 700; font-size: 14px;">${req.senderRollNumber}</div>
                  <div style="font-size: 11px; color: var(--text-muted);">Sent ${new Date(req.createdAt).toLocaleDateString()}</div>
                </div>
              </div>
              <div class="actions" style="flex-direction: column; gap: 6px;">
                <button onclick="respond('${req._id}', 'accepted')" class="btn-primary" style="width: 100%; padding: 6px 12px; font-size: 12px; margin: 0;">Accept</button>
                <button onclick="respond('${req._id}', 'rejected')" class="btn-ghost" style="width: 100%; padding: 6px 12px; font-size: 12px; margin: 0;">Ignore</button>
              </div>
            </div>
          `).join('');
        }
        
        // Accepted Connections
        if (accepted.length === 0) {
          accContainer.innerHTML = `
            <div style="text-align:center; padding: 40px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;">
              <i class="fas fa-user-friends" style="font-size: 32px; opacity: 0.1; margin-bottom: 16px;"></i>
              <p style="color: var(--text-muted); font-size: 13px;">No accepted connections.</p>
            </div>
          `;
        } else {
          accContainer.innerHTML = accepted.map(req => {
            const otherUser = req.senderRollNumber === myRoll ? req.receiverRollNumber : req.senderRollNumber;
            return `
              <div class="request-card" style="cursor: pointer;" onclick="location.href='/private-chat.html?roll=${otherUser}'">
                <div class="user-info">
                  <div class="avatar" style="background: var(--success);">${otherUser.slice(0, 2)}</div>
                  <div>
                    <div style="font-weight: 700; font-size: 14px;">${otherUser}</div>
                    <div style="font-size: 11px; color: var(--success);">Connected ${new Date(req.createdAt).toLocaleDateString()}</div>
                  </div>
                </div>
                <i class="fas fa-chevron-right" style="color: var(--text-muted); opacity: 0.5;"></i>
              </div>
            `;
          }).join('');
        }

      } catch (err) {
        console.error('Load requests error:', err);
      }
    }

    async function respond(id, status) {
      if (event) {
        event.stopPropagation();
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = '...';
      }
      try {
        await fetch(`/api/chat-request/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        loadRequests();
      } catch (err) {
        alert('Action failed');
        loadRequests();
      }
    }
    
    async function sendReq() {
      const input = document.getElementById('search-roll');
      const roll = input.value.trim().toUpperCase();
      if (!roll) return alert('Please enter a roll number');
      
      const btn = document.getElementById('req-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      
      try {
        const res = await fetch('/api/chat-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ receiverRollNumber: roll })
        });
        
        if (res.ok) {
          alert('Request sent!');
          input.value = '';
          loadRequests();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to send request');
        }
      } catch (err) {
        alert('Network error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Request';
      }
    }

    loadRequests();
    setInterval(loadRequests, 10000);
  </script>
</body>
</html>
