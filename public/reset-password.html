<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRDU Portal — Choose New Password</title>
  <meta name="description" content="Set a new secure password for your account." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-icon">🛡️</div>
        <div class="brand-title">Malla Reddy Deemed to be University</div>
        <div class="brand-sub">ACCOUNT SECURITY</div>
      </div>

      <h1 class="screen-title">Create New Password</h1>
      <p class="screen-subtitle">Your identity has been verified. You can now set a new password.</p>

      <!-- Alert -->
      <div id="alert" class="alert">
        <span class="alert-icon" id="alert-icon">⚠️</span>
        <span id="alert-msg">Error message</span>
      </div>

      <form id="password-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPassword" class="form-input" placeholder="Min. 6 characters" required />
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat new password" required />
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <ul class="pw-rules" id="pw-rules">
          <li id="rule-length">Must be at least 6 characters</li>
          <li id="rule-match">Passwords must match</li>
        </ul>

        <button type="submit" class="btn-primary" id="save-btn" disabled>Save New Password</button>
      </form>

    </div>
  </div>

  <script>
    const form = document.getElementById('password-form');
    const newPw = document.getElementById('newPassword');
    const confPw = document.getElementById('confirmPassword');
    const saveBtn = document.getElementById('save-btn');
    const alertEl = document.getElementById('alert');
    const alertMsg = document.getElementById('alert-msg');
    const alertIcon = document.getElementById('alert-icon');
    const ruleLength = document.getElementById('rule-length');
    const ruleMatch = document.getElementById('rule-match');

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert alert-${type} show`;
      alertMsg.textContent = msg;
      alertIcon.textContent = type === 'error' ? '⚠️' : '✅';
    }

    function checkRules() {
      const v1 = newPw.value;
      const v2 = confPw.value;
      
      const isLength = v1.length >= 6;
      const isMatch = v1 === v2 && v1.length > 0;

      ruleLength.className = isLength ? 'valid' : '';
      ruleMatch.className = isMatch ? 'valid' : '';

      saveBtn.disabled = !(isLength && isMatch);
    }

    newPw.addEventListener('input', checkRules);
    confPw.addEventListener('input', checkRules);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span> Saving...';
      alertEl.className = 'alert';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            newPassword: newPw.value, 
            confirmPassword: confPw.value 
          }),
          credentials: 'include'
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Failed to update password.');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save New Password';
          
          if (res.status === 403) {
            setTimeout(() => { window.location.href = '/forgot-password.html'; }, 3000);
          }
          return;
        }

        showAlert('Password reset successful! Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/index.html'; }, 2000);
      } catch (err) {
        showAlert('Network error. Please try again.');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save New Password';
      }
    });

  </script>
</body>
</html>
