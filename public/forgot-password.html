<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MRDU Portal — Forgot Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <div class="page">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-icon">🔐</div>
        <div class="brand-title">Malla Reddy Deemed to be University</div>
        <div class="brand-sub">ACCOUNT RECOVERY</div>
      </div>

      <h1 class="screen-title" id="screen-title">Reset Password</h1>
      <p class="screen-subtitle" id="subtitle-text">Enter your roll number to receive a verification code.</p>

      <!-- Masked email badge -->
      <div class="info-badge" id="email-badge" style="display: none;">
        📧 Sent to: <strong id="masked-email"></strong>
      </div>

      <div id="alert" class="alert">
        <span class="alert-icon" id="alert-icon">⚠️</span>
        <span id="alert-msg">Error message</span>
      </div>

      <!-- Step 1: Roll Number -->
      <form id="roll-form" novalidate autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="rollNumber">Roll Number</label>
          <div class="input-wrap">
            <input type="text" id="rollNumber" class="form-input" placeholder="e.g. 25EU0_R0___" autocomplete="off" spellcheck="false" maxlength="20" style="text-transform: uppercase;" required />
            <span class="input-icon">🪪</span>
          </div>
        </div>
        <button type="submit" class="btn-primary" id="send-otp-btn">Send Recovery Code</button>
        <button type="button" class="btn-ghost" onclick="window.location.href='/'" style="margin-top: 10px;">Back to Login</button>
      </form>

      <!-- Step 2: OTP Verification -->
      <div id="otp-section" style="display: none;">
        <div class="otp-inputs" id="otp-container">
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d0" />
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d1" />
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d2" />
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d3" />
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d4" />
          <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" id="d5" />
        </div>

        <!-- Timer -->
        <div class="timer-row">
          <span style="font-size:12px;">OTP expires in:</span>
          <span class="timer-count" id="timer">05:00</span>
        </div>

        <button class="btn-primary" id="verify-btn" style="margin-top: 20px;">Verify Code</button>
        <button class="btn-ghost" id="resend-btn" disabled>Resend Code (wait 60s)</button>
        <button type="button" class="btn-ghost" onclick="window.location.reload()" style="margin-top: 10px; opacity: 0.7;">Start Over</button>
      </div>

    </div>
  </div>

  <script>
    const rollForm = document.getElementById('roll-form');
    const rollInput = document.getElementById('rollNumber');
    const sendBtn = document.getElementById('send-otp-btn');
    
    const otpSection = document.getElementById('otp-section');
    const digits = Array.from(document.querySelectorAll('.otp-digit'));
    const verifyBtn = document.getElementById('verify-btn');
    const resendBtn = document.getElementById('resend-btn');
    
    const alertEl = document.getElementById('alert');
    const alertMsg = document.getElementById('alert-msg');
    const alertIcon = document.getElementById('alert-icon');
    
    const timerEl = document.getElementById('timer');
    const emailBadge = document.getElementById('email-badge');
    const maskedEmailEl = document.getElementById('masked-email');

    let currentRoll = '';
    let otpTimer, resendTimer;
    let otpSeconds = 5 * 60;
    let resendSeconds = 60;
    let isExpired = false;

    rollInput.addEventListener('input', () => {
      const pos = rollInput.selectionStart;
      rollInput.value = rollInput.value.toUpperCase();
      rollInput.setSelectionRange(pos, pos);
    });

    function showAlert(msg, type = 'error') {
      alertEl.className = `alert alert-${type} show`;
      alertMsg.textContent = msg;
      alertIcon.textContent = type === 'error' ? '⚠️' : type === 'success' ? '✅' : 'ℹ️';
    }
    function hideAlert() { alertEl.className = 'alert'; }

    // Send OTP
    rollForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      const roll = rollInput.value.trim().toUpperCase();
      if (!roll) { showAlert('Please enter your roll number.'); return; }

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="spinner"></span> Looking up...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rollNumber: roll }),
        });
        const data = await res.json();
        
        if (!res.ok) {
          showAlert(data.error || 'Failed to send OTP.');
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Recovery Code';
          return;
        }

        currentRoll = roll;
        emailBadge.style.display = 'block';
        maskedEmailEl.textContent = data.maskedEmail;
        
        // Switch views
        rollForm.style.display = 'none';
        otpSection.style.display = 'block';
        document.getElementById('screen-title').textContent = 'Verify Email';
        document.getElementById('subtitle-text').textContent = 'A 6-digit code has been sent to your email.';
        
        showAlert('Recovery code sent!', 'success');
        setTimeout(hideAlert, 3000);
        
        startOtpTimer();
        startResendCooldown();
        digits[0].focus();
      } catch (err) {
        showAlert('Network error. Please try again.');
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Recovery Code';
      }
    });

    // OTP Input Behaviour
    digits.forEach((el, i) => {
      el.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val) {
          el.classList.add('filled');
          if (i < 5) digits[i + 1].focus();
          else verifyBtn.focus();
        } else {
          el.classList.remove('filled');
        }
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !el.value && i > 0) {
          digits[i - 1].focus();
          digits[i - 1].value = '';
          digits[i - 1].classList.remove('filled');
        }
        if (e.key === 'ArrowLeft' && i > 0) digits[i - 1].focus();
        if (e.key === 'ArrowRight' && i < 5) digits[i + 1].focus();
        if (e.key === 'Enter') verifyOtp();
      });
      el.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (!pasted) return;
        pasted.split('').slice(0, 6).forEach((char, j) => {
          if (digits[j]) { digits[j].value = char; digits[j].classList.add('filled'); }
        });
        const nextEmpty = digits.find(d => !d.value);
        if (nextEmpty) nextEmpty.focus();
        else digits[5].focus();
      });
    });

    function getOTPValue() { return digits.map(d => d.value).join(''); }

    function startOtpTimer() {
      clearInterval(otpTimer);
      otpSeconds = 5 * 60;
      isExpired = false;
      timerEl.classList.remove('expired');

      otpTimer = setInterval(() => {
        otpSeconds--;
        const m = Math.floor(otpSeconds / 60).toString().padStart(2, '0');
        const s = (otpSeconds % 60).toString().padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;

        if (otpSeconds <= 0) {
          clearInterval(otpTimer);
          timerEl.textContent = 'Expired';
          timerEl.classList.add('expired');
          isExpired = true;
          showAlert('Code has expired. Please request a new one below.');
          verifyBtn.disabled = true;
        }
      }, 1000);
    }

    function startResendCooldown() {
      resendBtn.disabled = true;
      resendSeconds = 60;
      resendTimer = setInterval(() => {
        resendSeconds--;
        resendBtn.textContent = `Resend Code (${resendSeconds}s)`;
        if (resendSeconds <= 0) {
          clearInterval(resendTimer);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend Code';
        }
      }, 1000);
    }

    resendBtn.addEventListener('click', async () => {
      hideAlert();
      digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
      verifyBtn.disabled = false;
      
      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rollNumber: currentRoll }),
        });
        if (res.ok) {
          showAlert('New code sent!', 'success');
          startOtpTimer();
          startResendCooldown();
          digits[0].focus();
        } else {
          showAlert('Failed to resend code.');
        }
      } catch (err) {
        showAlert('Network error.');
      }
    });

    // Verify OTP
    async function verifyOtp() {
      hideAlert();
      const otp = getOTPValue();
      if (otp.length < 6) { showAlert('Please enter the complete 6-digit code.'); return; }
      if (isExpired) { showAlert('Code expired. Please request a new one.'); return; }

      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '<span class="spinner"></span> Verifying...';

      try {
        const res = await fetch('/api/auth/forgot-password-verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rollNumber: currentRoll, otp }),
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Verification failed.');
          digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
          setTimeout(() => { digits[0].focus(); }, 100);
          verifyBtn.disabled = false;
          verifyBtn.textContent = 'Verify Code';
          return;
        }

        showAlert('Verified! Redirecting...', 'success');
        clearInterval(otpTimer);
        setTimeout(() => { window.location.href = '/reset-password.html'; }, 1000);
      } catch (err) {
        showAlert('Network error. Please try again.');
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify Code';
      }
    }

    verifyBtn.addEventListener('click', verifyOtp);
  </script>
</body>
</html>
